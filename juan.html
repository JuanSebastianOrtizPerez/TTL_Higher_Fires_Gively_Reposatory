<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐷✈️ Flying Pigs</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .group-banner {
            background: #ffb6c1;
            color: #333;
            font-size: 2.5rem;
            font-weight: bold;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }

        .page-header {
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        .person-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin: 25px auto;
            box-shadow: 0 4px 12px rgba(0,0,0,.1);
        }

        .avatar-icon {
            font-size: 5rem;
            margin-bottom: 10px;
        }

        h2 {
            color: #222;
        }

        .info-section {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 8px 0;
            font-size: 1.1rem;
        }

        .page-footer {
            background: white;
            padding: 20px;
            margin-top: 30px;
        }
    </style>
</head>
